services:
  app:
    container_name: kinova-backend-prod
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-kinova}
      DB_USERNAME: ${DB_USERNAME:-kinova_user}
      DB_PASSWORD: ${DB_PASSWORD:-kinova_password}
      REDIS_HOST: cache
      REVERB_APP_ID: ${REVERB_APP_ID:-kinova_app_id}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-kinova_app_key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-kinova_app_secret}
      REVERB_HOST: ${REVERB_HOST:-api.yourdomain.com}
      REVERB_PORT: 443
      REVERB_SCHEME: https
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      - db
      - cache
    networks:
      - internal
      - proxy-net   # Connects to your Nginx Proxy Manager network

  frontend:
    container_name: kinova-frontend-prod
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://${REVERB_HOST:-api.yourdomain.com}
    networks:
      - proxy-net   # Connects Next.js directly to Nginx Proxy Manager

  db:
    image: postgres:15-alpine
    container_name: kinova-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-kinova}
      POSTGRES_USER: ${DB_USERNAME:-kinova_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kinova_password}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal

  cache:
    image: redis:7-alpine
    container_name: kinova-cache-prod
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - internal

volumes:
  app-storage:
  db-data:
  redis-data:

networks:
  internal:
    driver: bridge
  proxy-net:
    external: true   # Custom network managed by your Nginx Proxy Manager
